<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroFlow.ai</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#111827;color:#F9FAFB;min-height:100vh}
/* ── LOGIN ── */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#111827}
.login-box{background:#1F2937;border:1px solid #374151;border-radius:16px;padding:48px 40px;width:380px;text-align:center}
.login-logo{width:64px;height:64px;background:#0D9488;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.login-logo svg{width:36px;height:36px}
.login-box h1{font-size:24px;font-weight:700;color:#F9FAFB;margin-bottom:4px}
.login-box p{color:#9CA3AF;font-size:13px;margin-bottom:32px}
.login-box input{width:100%;padding:12px 16px;background:#111827;border:1px solid #374151;border-radius:8px;color:#F9FAFB;font-size:14px;outline:none;margin-bottom:12px}
.login-box input:focus{border-color:#0D9488}
.btn-primary{width:100%;padding:12px;background:#0D9488;border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s}
.btn-primary:hover{background:#0F766E}
.login-hint{margin-top:16px;font-size:12px;color:#6B7280}
/* ── LAYOUT ── */
#app{display:none;height:100vh;overflow:hidden;flex-direction:row}
#app.visible{display:flex}
/* SIDEBAR */
#sidebar{width:220px;background:#1F2937;border-right:1px solid #374151;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-brand{padding:20px 16px 12px;border-bottom:1px solid #374151;display:flex;align-items:center;gap:10px}
.brand-icon{width:36px;height:36px;background:#0D9488;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-icon svg{width:20px;height:20px}
.brand-name{font-size:16px;font-weight:700;color:#F9FAFB}
.brand-sub{font-size:10px;color:#6B7280;margin-top:1px}
.sidebar-clinic{padding:12px 16px;border-bottom:1px solid #374151}
.sidebar-clinic-name{font-size:12px;font-weight:600;color:#0D9488}
.sidebar-clinic-doc{font-size:11px;color:#9CA3AF}
nav{flex:1;padding:8px 0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-left:3px solid transparent;color:#9CA3AF;font-size:13px;font-weight:500;transition:all .15s;user-select:none}
.nav-item:hover{color:#F9FAFB;background:#374151}
.nav-item.active{color:#0D9488;border-left-color:#0D9488;background:rgba(13,148,136,.08)}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.sidebar-bottom{padding:12px 16px;border-top:1px solid #374151}
.sidebar-logout{display:flex;align-items:center;gap:8px;color:#6B7280;font-size:12px;cursor:pointer;padding:8px;border-radius:6px}
.sidebar-logout:hover{color:#F9FAFB;background:#374151}
/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:#1F2937;border-bottom:1px solid #374151;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:18px;font-weight:700;color:#F9FAFB}
.topbar-actions{display:flex;align-items:center;gap:10px}
#content{flex:1;overflow-y:auto;padding:24px}
/* ── CARDS & GRIDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:#1F2937;border:1px solid #374151;border-radius:12px;padding:20px}
.stat-label{font-size:12px;color:#9CA3AF;margin-bottom:6px}
.stat-value{font-size:28px;font-weight:700;color:#F9FAFB}
.stat-sub{font-size:11px;color:#6B7280;margin-top:4px}
.stat-card.accent .stat-value{color:#0D9488}
.card{background:#1F2937;border:1px solid #374151;border-radius:12px;padding:20px;margin-bottom:16px}
.card-title{font-size:14px;font-weight:600;color:#F9FAFB;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
/* ── BUTTONS ── */
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:background .15s}
.btn-teal{background:#0D9488;color:#fff}.btn-teal:hover{background:#0F766E}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-ghost{background:transparent;border:1px solid #374151;color:#9CA3AF}.btn-ghost:hover{color:#F9FAFB;border-color:#6B7280}
.btn-red{background:#DC2626;color:#fff}.btn-red:hover{background:#B91C1C}
.btn-green{background:#059669;color:#fff}.btn-green:hover{background:#047857}
/* ── BADGES ── */
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}
.badge-teal{background:rgba(13,148,136,.15);color:#0D9488}
.badge-green{background:rgba(5,150,105,.15);color:#10B981}
.badge-yellow{background:rgba(245,158,11,.15);color:#F59E0B}
.badge-red{background:rgba(220,38,38,.15);color:#EF4444}
.badge-gray{background:rgba(107,114,128,.15);color:#9CA3AF}
/* ── TABLES ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;color:#6B7280;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #374151}
td{padding:10px 12px;border-bottom:1px solid #1F2937;color:#D1D5DB;vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
/* ── FORMS ── */
.form-row{display:grid;gap:12px;margin-bottom:12px}
.form-row-2{grid-template-columns:1fr 1fr}
.form-row-3{grid-template-columns:1fr 1fr 1fr}
label{display:block;font-size:12px;color:#9CA3AF;margin-bottom:4px;font-weight:500}
input[type=text],input[type=email],input[type=date],input[type=tel],input[type=password],input[type=number],select,textarea{width:100%;padding:9px 12px;background:#111827;border:1px solid #374151;border-radius:8px;color:#F9FAFB;font-size:13px;outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:#0D9488}
select option{background:#1F2937}
textarea{resize:vertical;min-height:80px}
/* ── PATIENT LIST ── */
.patient-list{display:flex;flex-direction:column;gap:2px}
.patient-row{display:flex;align-items:center;gap:12px;padding:12px;border-radius:8px;cursor:pointer;border:1px solid transparent}
.patient-row:hover{background:#374151}
.patient-row.selected{background:rgba(13,148,136,.1);border-color:#0D9488}
.patient-avatar{width:36px;height:36px;background:#0D9488;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.patient-name{font-size:14px;font-weight:600;color:#F9FAFB}
.patient-meta{font-size:11px;color:#9CA3AF}
/* ── SCHEDULING ── */
.sched-grid{display:grid;grid-template-columns:60px repeat(5,1fr);border:1px solid #374151;border-radius:10px;overflow:hidden;font-size:12px}
.sched-header{background:#374151;padding:8px;text-align:center;font-weight:600;color:#F9FAFB;border-bottom:1px solid #4B5563}
.sched-time{background:#1A2332;padding:6px 8px;color:#6B7280;text-align:right;border-bottom:1px solid #374151;border-right:1px solid #374151;font-size:11px}
.sched-slot{min-height:32px;border-bottom:1px solid #1F2937;border-right:1px solid #374151;padding:2px;cursor:pointer;transition:background .1s}
.sched-slot:hover{background:rgba(13,148,136,.08)}
.sched-slot:last-child{border-right:none}
.sched-appt{background:rgba(13,148,136,.2);border:1px solid #0D9488;border-radius:4px;padding:3px 6px;font-size:11px;color:#0D9488;font-weight:600;cursor:pointer}
.sched-appt.new-pt{background:rgba(139,92,246,.2);border-color:#8B5CF6;color:#8B5CF6}
.sched-appt.procedure{background:rgba(245,158,11,.2);border-color:#F59E0B;color:#F59E0B}
/* ── MESSAGING ── */
.msg-layout{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 160px);gap:0;border:1px solid #374151;border-radius:12px;overflow:hidden}
.msg-threads{background:#1F2937;border-right:1px solid #374151;overflow-y:auto}
.msg-thread-item{padding:14px 16px;cursor:pointer;border-bottom:1px solid #374151}
.msg-thread-item:hover{background:#374151}
.msg-thread-item.active{background:rgba(13,148,136,.1);border-left:3px solid #0D9488}
.msg-thread-name{font-size:13px;font-weight:600;color:#F9FAFB}
.msg-thread-preview{font-size:11px;color:#6B7280;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msg-unread{width:8px;height:8px;background:#0D9488;border-radius:50%;float:right;margin-top:4px}
.msg-chat{display:flex;flex-direction:column;background:#111827}
.msg-chat-header{padding:14px 20px;border-bottom:1px solid #374151;background:#1F2937}
.msg-chat-title{font-size:14px;font-weight:600;color:#F9FAFB}
.msg-chat-sub{font-size:11px;color:#9CA3AF}
.msg-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg-bubble{max-width:70%;padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.5}
.msg-bubble.inbound{background:#1F2937;border:1px solid #374151;color:#D1D5DB;align-self:flex-start}
.msg-bubble.outbound{background:#0D9488;color:#fff;align-self:flex-end}
.msg-bubble .msg-sender{font-size:10px;font-weight:600;margin-bottom:4px;opacity:.7}
.msg-bubble .msg-time{font-size:10px;margin-top:4px;opacity:.6;text-align:right}
.msg-compose{padding:14px 20px;border-top:1px solid #374151;background:#1F2937;display:flex;gap:8px}
.msg-compose textarea{flex:1;padding:10px 12px;background:#111827;border:1px solid #374151;border-radius:8px;color:#F9FAFB;font-size:13px;resize:none;height:70px;outline:none;font-family:inherit}
.msg-compose textarea:focus{border-color:#0D9488}
/* ── DIAGNOSTICS ── */
.diag-tabs{display:flex;gap:2px;margin-bottom:16px;background:#374151;border-radius:8px;padding:3px}
.diag-tab{flex:1;padding:8px;text-align:center;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:#9CA3AF;transition:all .15s}
.diag-tab.active{background:#0D9488;color:#fff}
/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#1F2937;border:1px solid #374151;border-radius:16px;padding:28px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;color:#F9FAFB;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.modal-close{cursor:pointer;color:#6B7280;font-size:20px;line-height:1}
.modal-close:hover{color:#F9FAFB}
/* ── AI BOX ── */
.ai-box{background:#111827;border:1px solid #0D9488;border-radius:10px;padding:16px;margin-top:12px}
.ai-box-title{font-size:12px;font-weight:600;color:#0D9488;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.ai-result{font-size:13px;color:#D1D5DB;line-height:1.6;white-space:pre-wrap}
.ai-spinner{display:flex;align-items:center;gap:8px;color:#9CA3AF;font-size:13px}
.spinner{width:16px;height:16px;border:2px solid #374151;border-top-color:#0D9488;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* ── SEARCH ── */
.search-bar{width:100%;padding:9px 12px 9px 36px;background:#111827;border:1px solid #374151;border-radius:8px;color:#F9FAFB;font-size:13px;outline:none}
.search-bar:focus{border-color:#0D9488}
.search-wrap{position:relative;margin-bottom:16px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#6B7280;width:14px;height:14px}
/* ── ACTIVITY FEED ── */
.activity-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #374151}
.activity-item:last-child{border-bottom:none}
.activity-dot{width:8px;height:8px;background:#0D9488;border-radius:50%;margin-top:5px;flex-shrink:0}
.activity-text{font-size:13px;color:#D1D5DB}
.activity-time{font-size:11px;color:#6B7280;margin-top:2px}
/* ── TODAY SCHEDULE ── */
.appt-mini{display:flex;align-items:center;gap:12px;padding:10px;border-radius:8px;background:#111827;border:1px solid #374151;margin-bottom:8px}
.appt-time-mini{font-size:12px;font-weight:700;color:#0D9488;width:55px;flex-shrink:0}
.appt-name-mini{font-size:13px;font-weight:600;color:#F9FAFB}
.appt-type-mini{font-size:11px;color:#9CA3AF}
/* ── SETTINGS ── */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.settings-card{background:#1F2937;border:1px solid #374151;border-radius:12px;padding:20px}
.settings-card-title{font-size:14px;font-weight:600;color:#F9FAFB;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #374151}
/* ── CHARTING ── */
.soap-section{margin-bottom:16px}
.soap-label{font-size:13px;font-weight:700;color:#0D9488;margin-bottom:6px;display:flex;align-items:center;gap:6px}
/* ── SPLIT LAYOUT ── */
.split-layout{display:grid;grid-template-columns:280px 1fr;gap:16px}
/* ── UTILS ── */
.text-teal{color:#0D9488}
.text-muted{color:#6B7280}
.text-sm{font-size:12px}
.mt-2{margin-top:8px}
.mt-4{margin-top:16px}
.flex{display:flex}
.flex-col{flex-direction:column}
.items-center{align-items:center}
.justify-between{justify-content:space-between}
.gap-2{gap:8px}
.gap-3{gap:12px}
.w-full{width:100%}
.hidden{display:none!important}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
</style>
</head>
<body>

<!-- ═══════════════════ LOGIN ═══════════════════ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="18" cy="14" rx="10" ry="8" stroke="white" stroke-width="2"/>
        <path d="M8 14 Q10 10 12 14 Q14 18 16 14 Q18 10 20 14 Q22 18 24 14 Q26 10 28 14" stroke="white" stroke-width="1.5" fill="none"/>
        <path d="M12 22 Q15 28 18 30 Q21 28 24 22" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>NeuroFlow.ai</h1>
    <p>Genesee Neurology Associates</p>
    <input type="password" id="loginPw" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-primary" onclick="doLogin()">Sign In</button>
    <div class="login-hint">Default password: <strong>neuro2026</strong></div>
    <div id="loginErr" style="color:#EF4444;font-size:12px;margin-top:8px;display:none">Incorrect password</div>
  </div>
</div>

<!-- ═══════════════════ APP ═══════════════════ -->
<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 20 20" fill="none">
          <ellipse cx="10" cy="8" rx="6" ry="5" stroke="white" stroke-width="1.5"/>
          <path d="M4 8 Q5 6 6 8 Q7 10 8 8 Q9 6 10 8 Q11 10 12 8 Q13 6 14 8" stroke="white" stroke-width="1" fill="none"/>
          <path d="M7 13 Q8.5 16 10 17 Q11.5 16 13 13" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">NeuroFlow.ai</div>
        <div class="brand-sub">v1.0</div>
      </div>
    </div>
    <div class="sidebar-clinic">
      <div class="sidebar-clinic-name">Genesee Neurology Associates</div>
      <div class="sidebar-clinic-doc">Dr. Michael Harmon, MD</div>
    </div>
    <nav id="sideNav">
      <div class="nav-item active" onclick="navigate('dashboard')" data-section="dashboard">
        <svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
        Dashboard
      </div>
      <div class="nav-item" onclick="navigate('patients')" data-section="patients">
        <svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>
        Patients
      </div>
      <div class="nav-item" onclick="navigate('charting')" data-section="charting">
        <svg viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="1" width="12" height="14" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="5" y1="5" x2="11" y2="5" stroke="currentColor" stroke-width="1"/><line x1="5" y1="8" x2="11" y2="8" stroke="currentColor" stroke-width="1"/><line x1="5" y1="11" x2="9" y2="11" stroke="currentColor" stroke-width="1"/></svg>
        Charting
      </div>
      <div class="nav-item" onclick="navigate('scheduling')" data-section="scheduling">
        <svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="3" width="14" height="12" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="5" y1="1" x2="5" y2="5" stroke="currentColor" stroke-width="1.5"/><line x1="11" y1="1" x2="11" y2="5" stroke="currentColor" stroke-width="1.5"/><line x1="1" y1="7" x2="15" y2="7" stroke="currentColor" stroke-width="1"/></svg>
        Scheduling
      </div>
      <div class="nav-item" onclick="navigate('billing')" data-section="billing">
        <svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="14" height="12" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="5" y1="6" x2="11" y2="6" stroke="currentColor" stroke-width="1"/><line x1="5" y1="9" x2="9" y2="9" stroke="currentColor" stroke-width="1"/></svg>
        Billing
      </div>
      <div class="nav-item" onclick="navigate('messaging')" data-section="messaging">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M14 1H2a1 1 0 00-1 1v9a1 1 0 001 1h3l3 3 3-3h3a1 1 0 001-1V2a1 1 0 00-1-1z" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
        Messaging <span id="msgBadge" class="badge badge-teal" style="margin-left:auto;display:none">0</span>
      </div>
      <div class="nav-item" onclick="navigate('diagnostics')" data-section="diagnostics">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M1 8 Q2 4 3 8 Q4 12 5 8 Q6 4 7 8 Q8 12 9 8 Q10 4 11 8 Q12 12 13 8 Q14 4 15 8" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
        Diagnostics
      </div>
      <div class="nav-item" onclick="navigate('settings')" data-section="settings">
        <svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="2.5" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M3.2 12.8l1.4-1.4M11.4 4.6l1.4-1.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Settings
      </div>
    </nav>
    <div class="sidebar-bottom">
      <div class="sidebar-logout" onclick="doLogout()">
        <svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14"><path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M10 11l3-3-3-3M13 8H6" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
        Sign Out
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="topbar">
      <div class="topbar-title" id="topbarTitle">Dashboard</div>
      <div class="topbar-actions" id="topbarActions"></div>
    </div>
    <div id="content"></div>
  </div>
</div>

<!-- ═══════════════════ MODAL ═══════════════════ -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal" id="modalBox">
    <div class="modal-title">
      <span id="modalTitle"></span>
      <span class="modal-close" onclick="closeModal()">✕</span>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════
//  CONSTANTS & KEYS
// ════════════════════════════════════════════════
const PW_KEY   = 'neuroflow_pw_v1';
const DATA_KEY = 'neuroflow_data_v1';
const SET_KEY  = 'neuroflow_settings_v1';
const AI_KEY   = 'neuroflow_anthropic_key_v1';
const DEFAULT_PW = btoa('neuro2026');

let state = { section: 'dashboard', selectedPatientId: null, diagTab: 'eeg', msgThread: null };

// ════════════════════════════════════════════════
//  SEED DATA
// ════════════════════════════════════════════════
function getSeedData() {

}

function doLogin() {
  const pw = document.getElementById('loginPw').value;
  const stored = localStorage.getItem(PW_KEY) || DEFAULT_PW;
  if (btoa(pw) === stored) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    loadData();
    navigate('dashboard');
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}
function doLogout() {
  document.getElementById('app').classList.remove('visible');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginPw').value = '';
  document.getElementById('loginErr').style.display = 'none';
}

const TITLES = { dashboard:'Dashboard', patients:'Patients', charting:'Charting', scheduling:'Scheduling', billing:'Billing & Codes', messaging:'Patient Messaging', diagnostics:'Neurodiagnostics', settings:'Settings' };

function navigate(section) {
  state.section = section;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.section === section));
  document.getElementById('topbarTitle').textContent = TITLES[section] || section;
  document.getElementById('topbarActions').innerHTML = '';
  const renders = { dashboard: renderDashboard, patients: renderPatients, charting: renderCharting, scheduling: renderScheduling, billing: renderBilling, messaging: renderMessaging, diagnostics: renderDiagnostics, settings: renderSettings };
  if (renders[section]) renders[section]();
  updateMsgBadge();
}

function updateMsgBadge() {
  const unread = appData.messages.filter(m => m.unread).length;
  const badge = document.getElementById('msgBadge');
  badge.style.display = unread ? 'inline-block' : 'none';
  badge.textContent = unread;
}

function openModal(title, bodyHtml) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalOverlay').classList.remove('hidden');
}
function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); }
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });

  document.getElementById('content').innerHTML = `

        ${todayAppts.length ? todayAppts.map(a => `
          <div class="appt-mini">

function renderPatients(filter='') {
  const topbar = document.getElementById('topbarActions');

  const list = appData.patients.filter(p => !filter || p.name.toLowerCase().includes(filter.toLowerCase()) || p.diagnosis.toLowerCase().includes(filter.toLowerCase()));
  const selected = state.selectedPatientId ? appData.patients.find(p => p.id === state.selectedPatientId) : null;

  document.getElementById('content').innerHTML = `
    <div class="split-layout">
      <div>
        <div class="search-wrap">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="6" r="4"/><path d="M9 9l3 3"/></svg>

function saveNewPatient() {

  if (!first || !last) { alert('Name required'); return; }
  const dob = document.getElementById('np_dob').value;
  const age = dob ? Math.floor((new Date() - new Date(dob)) / 31557600000) : 0;
  const p = {
    id: 'p' + Date.now(),
    name: first + ' ' + last,
    dob, age,

async function runAiNote(ptId, tpl) {
  const key = getApiKey();
  if (!key) { alert('Enter your Anthropic API key in Settings first.'); return; }
  const bullets = document.getElementById('ai_bullets').value;
  if (!bullets.trim()) { alert('Enter visit notes first.'); return; }
  const pt = ptId ? appData.patients.find(p => p.id === ptId) : null;
  const box = document.getElementById('ai_note_result');
  box.classList.remove('hidden');
  document.getElementById('ai_note_text').innerHTML = '<div class="ai-spinner"><div class="spinner"></div>Generating note...</div>';
  const prompt = `You are a neurologist's clinical documentation assistant. Generate a complete, professional SOAP note for a neurology office visit.

Patient: ${pt ? pt.name + ', ' + pt.age + 'y/o ' + pt.sex + ', Dx: ' + pt.diagnosis : 'Not specified'}
Visit Template: ${tpl}
Clinical Bullets:
${bullets}

Output EXACTLY in this format with these labels (no extra text before or after):
S: [subjective section]
O: [objective section]
A: [assessment section]
P: [plan section]

Be clinically accurate, concise, and professional. Use standard neurology terminology.`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{ 'x-api-key': key, 'anthropic-version':'2023-06-01', 'content-type':'application/json', 'anthropic-dangerous-direct-browser-calls':'true' },
      body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:800, messages:[{ role:'user', content: prompt }] })
    });
    const data = await resp.json();
    const text = data.content[0].text;
    document.getElementById('ai_note_text').textContent = text;
    window._aiNoteText = text;
  } catch(e) {
    document.getElementById('ai_note_text').textContent = 'Error: ' + e.message;
  }
}

function applyAiNote() {
  const text = window._aiNoteText || '';
  const parse = (label) => {
    const re = new RegExp(label + ':\\s*([\\s\\S]*?)(?=\\n[SOAP]:|$)', 'i');
    const m = text.match(re);
    return m ? m[1].trim() : '';
  };
  document.getElementById('soap_s').value = parse('S');
  document.getElementById('soap_o').value = parse('O');
  document.getElementById('soap_a').value = parse('A');
  document.getElementById('soap_p').value = parse('P');
  closeModal();
}

function renderScheduling() {
  document.getElementById('topbarActions').innerHTML = `<button class="btn btn-teal btn-sm" onclick="openAddAppt()">+ Schedule</button>`;
  const today = new Date();
  const weekDays = [];
  const dow = today.getDay();
  const monday = new Date(today); monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
  for(let i=0;i<5;i++) { const d = new Date(monday); d.setDate(monday.getDate()+i); weekDays.push(d); }
  const fmt = d => d.toISOString().split('T')[0];
  const dayNames = ['Mon','Tue','Wed','Thu','Fri'];
  const dayLabels = weekDays.map(d => dayNames[weekDays.indexOf(d)] + ' ' + (d.getMonth()+1)+'/'+d.getDate());

  const times = [];
  for(let h=8;h<17;h++) { times.push(`${h}:00`); times.push(`${h}:30`); }

  let html = `<div class="sched-grid">
    <div class="sched-header"></div>
    ${dayLabels.map((d,i) => `<div class="sched-header" style="${fmt(weekDays[i])===fmt(today)?'background:#0D9488;color:#fff':''}">${d}</div>`).join('')}`;

  times.forEach(t => {
    html += `<div class="sched-time">${t}</div>`;
    weekDays.forEach((d,i) => {
      const appts = appData.appointments.filter(a => a.date === fmt(d) && a.time === t);
      html += `<div class="sched-slot" onclick="openAddAppt('${fmt(d)}','${t}')">`;
      appts.forEach(a => {
        const cls = a.type === 'New Patient' ? 'new-pt' : (a.type === 'EEG' || a.type === 'EMG') ? 'procedure' : '';
        html += `<div class="sched-appt ${cls}" title="${a.patientName} — ${a.notes}" onclick="event.stopPropagation();viewAppt('${a.id}')">${a.time} ${a.patientName.split(' ')[0]}</div>`;
      });
      html += `</div>`;
    });
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

  const desc = prompt('Describe the visit briefly (e.g. "Established patient, complex medication adjustment for Parkinson\'s, 30 min"):');
  if (!desc) return;
  runAiCodeSuggest(desc);
}

async function runAiCodeSuggest(desc) {
  const key = getApiKey();
  if (!key) { alert('Enter your Anthropic API key in Settings first.'); return; }
  const box = document.getElementById('ai_code_result');
  box.classList.remove('hidden');
  document.getElementById('ai_code_text').innerHTML = '<div class="ai-spinner"><div class="spinner"></div>Analyzing...</div>';
  const prompt = `You are a neurology billing specialist. Suggest the most appropriate CPT code and ICD-10 code for this visit description. Reply concisely in 3-4 lines: CPT code + reason, ICD-10 code + reason.

Visit: ${desc}`;
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{ 'x-api-key': key, 'anthropic-version':'2023-06-01', 'content-type':'application/json', 'anthropic-dangerous-direct-browser-calls':'true' },
      body: JSON.stringify({ model:'claude-haiku-4-5-20251001', max_tokens:200, messages:[{ role:'user', content: prompt }] })
    });
    const data = await resp.json();
    document.getElementById('ai_code_text').textContent = data.content[0].text;
  } catch(e) {
    document.getElementById('ai_code_text').textContent = 'Error: ' + e.message;
  }
}

function saveCharge() {
  const ptId = document.getElementById('cc_pt').value;
  if (!ptId) { alert('Select a patient.'); return; }
  const pt = appData.patients.find(p => p.id === ptId);
  const cptRaw = document.getElementById('cc_cpt').value.split('|');
  const charge = {
    id: 'c' + Date.now(), patientId: ptId, patientName: pt.name,
    date: document.getElementById('cc_date').value,
    cpt: cptRaw[0], amount: parseFloat(cptRaw[1]),
    description: cptRaw[2],
    icd10: document.getElementById('cc_icd').value,
    payer: document.getElementById('cc_payer').value || 'Self-pay',
    status: 'Submitted'
  };
  appData.charges.unshift(charge);
  appData.activity.unshift({ text:`Charge submitted: ${pt.name} (${charge.cpt})`, time: charge.date + ' ' + new Date().toTimeString().slice(0,5) });
  saveData();
  closeModal();
  renderBilling();
}

// ════════════════════════════════════════════════
//  MESSAGING
// ════════════════════════════════════════════════
function renderMessaging() {
  const activeThread = state.msgThread ? appData.messages.find(m => m.id === state.msgThread) : appData.messages[0];
  if (activeThread) { state.msgThread = activeThread.id; activeThread.unread = false; saveData(); updateMsgBadge(); }

  document.getElementById('topbarActions').innerHTML = `<button class="btn btn-teal btn-sm" onclick="newMsgThread()">+ New Message</button>`;
  document.getElementById('content').innerHTML = `
    <div class="msg-layout">
      <div class="msg-threads">
        ${appData.messages.map(m => `
          <div class="msg-thread-item ${m.id === state.msgThread ? 'active' : ''}" onclick="selectThread('${m.id}')">
            ${m.unread ? '<div class="msg-unread"></div>' : ''}
            <div class="msg-thread-name">${m.patientName}</div>
            <div class="msg-thread-preview">${m.thread[m.thread.length-1]?.text || ''}</div>
          </div>`).join('')}
      </div>
      <div class="msg-chat" style="display:flex;flex-direction:column">
        ${activeThread ? `
          <div class="msg-chat-header">
            <div class="msg-chat-title">${activeThread.patientName}</div>
            <div class="msg-chat-sub">${activeThread.condition}</div>
          </div>
          <div class="msg-messages" id="msgMessages">
            ${activeThread.thread.map(msg => `
              <div>
                <div class="msg-bubble ${msg.sender === 'doctor' ? 'outbound' : 'inbound'}">
                  <div class="msg-sender">${msg.name}</div>
                  ${msg.text}
                  <div class="msg-time">${msg.time}</div>
                </div>
              </div>`).join('')}
          </div>
          <div class="msg-compose">
            <textarea id="msgInput" placeholder="Type a message..."></textarea>
            <div style="display:flex;flex-direction:column;gap:6px">
              <button class="btn btn-teal btn-sm" onclick="sendMsg('${activeThread.id}')">Send</button>
              <button class="btn btn-ghost btn-sm" onclick="aiReply('${activeThread.id}')">✦ AI</button>
            </div>
          </div>` : '<div style="flex:1;display:flex;align-items:center;justify-content:center;color:#6B7280">No messages</div>'}
      </div>
    </div>`;
  const msgs = document.getElementById('msgMessages');
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
}

function selectThread(id) { state.msgThread = id; renderMessaging(); }

function sendMsg(threadId) {
  const text = document.getElementById('msgInput').value.trim();
  if (!text) return;
  const thread = appData.messages.find(m => m.id === threadId);
  if (!thread) return;
  thread.thread.push({ sender:'doctor', name:'Dr. Harmon', text, time: new Date().toISOString().split('T')[0] + ' ' + new Date().toTimeString().slice(0,5) });
  saveData();
  renderMessaging();
}

async function aiReply(threadId) {
  const key = getApiKey();
  if (!key) { alert('Enter your Anthropic API key in Settings first.'); return; }
  const thread = appData.messages.find(m => m.id === threadId);
  if (!thread) return;
  const last3 = thread.thread.slice(-3).map(m => `${m.name}: ${m.text}`).join('\n');
  const prompt = `You are Dr. Michael Harmon, a neurologist. Draft a brief, professional patient message reply. Patient condition: ${thread.condition}. Recent messages:\n${last3}\n\nWrite a concise, helpful reply (2-4 sentences):`;
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{ 'x-api-key': key, 'anthropic-version':'2023-06-01', 'content-type':'application/json', 'anthropic-dangerous-direct-browser-calls':'true' },
      body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:200, messages:[{ role:'user', content: prompt }] })
    });
    const data = await resp.json();
    const input = document.getElementById('msgInput');
    if (input) input.value = data.content[0].text;
  } catch(e) { alert('AI error: ' + e.message); }
}

function newMsgThread() {
  openModal('New Patient Message', `
    <div class="form-row">
      <div><label>Patient</label>
        <select id="nm_pt"><option value="">Select patient...</option>${appData.patients.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select>
      </div>
    </div>
    <div class="form-row"><div><label>Message</label><textarea id="nm_msg" rows="4"></textarea></div></div>
    <button class="btn btn-teal w-full" onclick="createThread()">Send Message</button>`);
}

function createThread() {
  const ptId = document.getElementById('nm_pt').value;
  if (!ptId) { alert('Select a patient.'); return; }
  const pt = appData.patients.find(p => p.id === ptId);
  const text = document.getElementById('nm_msg').value.trim();
  if (!text) { alert('Enter a message.'); return; }
  const thread = {
    id: 'm' + Date.now(), patientId: ptId, patientName: pt.name, condition: pt.diagnosis, unread: false,
    thread: [{ sender:'doctor', name:'Dr. Harmon', text, time: new Date().toISOString().split('T')[0] + ' ' + new Date().toTimeString().slice(0,5) }]
  };
  appData.messages.unshift(thread);
  saveData();
  closeModal();
  state.msgThread = thread.id;
  renderMessaging();
}

// ════════════════════════════════════════════════
//  NEURODIAGNOSTICS
// ════════════════════════════════════════════════
function renderDiagnostics() {
  document.getElementById('topbarActions').innerHTML = `<button class="btn btn-teal btn-sm" onclick="openAddDiag()">+ Add Study</button>`;
  const tab = state.diagTab;

  const eegFindings = ['Normal','Abnormal-Focal','Abnormal-Generalized','Sleep-Abnormal'];
  const eegBadge = f => ({ 'Normal':'badge-green','Abnormal-Focal':'badge-yellow','Abnormal-Generalized':'badge-red','Sleep-Abnormal':'badge-yellow' }[f]||'badge-gray');
  const emgBadge = f => f === 'Normal' ? 'badge-green' : 'badge-red';

  document.getElementById('content').innerHTML = `
    <div class="diag-tabs">
      <div class="diag-tab ${tab==='eeg'?'active':''}" onclick="switchDiagTab('eeg')">EEG</div>
      <div class="diag-tab ${tab==='emg'?'active':''}" onclick="switchDiagTab('emg')">EMG / NCS</div>
      <div class="diag-tab ${tab==='imaging'?'active':''}" onclick="switchDiagTab('imaging')">Imaging</div>
    </div>

    ${tab === 'eeg' ? `
      <div class="card">
        <div class="card-title">EEG Log <span class="text-muted text-sm" style="font-weight:400">${appData.diagnostics.eeg.length} studies</span></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Date</th><th>Patient</th><th>Indication</th><th>Technician</th><th>Findings</th><th>Summary</th><th></th></tr></thead>
            <tbody>
              ${appData.diagnostics.eeg.map(e => `
                <tr>
                  <td>${e.date}</td><td>${e.patientName}</td><td>${e.indication}</td><td>${e.technician}</td>
                  <td><span class="badge ${eegBadge(e.findings)}">${e.findings}</span></td>
                  <td style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.summary}</td>
                  <td><button class="btn btn-ghost btn-sm" onclick="viewDiagDetail('eeg','${e.id}')">View</button></td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>` : ''}

    ${tab === 'emg' ? `
      <div class="card">
        <div class="card-title">EMG / NCS Log <span class="text-muted text-sm" style="font-weight:400">${appData.diagnostics.emg.length} studies</span></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Date</th><th>Patient</th><th>Indication</th><th>Technician</th><th>Results</th><th>Summary</th><th></th></tr></thead>
            <tbody>
              ${appData.diagnostics.emg.map(e => `
                <tr>
                  <td>${e.date}</td><td>${e.patientName}</td><td>${e.indication}</td><td>${e.technician}</td>
                  <td><span class="badge ${emgBadge(e.findings)}">${e.findings}</span></td>
                  <td style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.summary}</td>
                  <td><button class="btn btn-ghost btn-sm" onclick="viewDiagDetail('emg','${e.id}')">View</button></td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>` : ''}

    ${tab === 'imaging' ? `
      <div class="card">
        <div class="card-title">Imaging Log <span class="text-muted text-sm" style="font-weight:400">${appData.diagnostics.imaging.length} studies</span></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Date</th><th>Patient</th><th>Modality</th><th>Indication</th><th>Findings</th><th></th></tr></thead>
            <tbody>
              ${appData.diagnostics.imaging.map(e => `
                <tr>
                  <td>${e.date}</td><td>${e.patientName}</td>
                  <td><span class="badge badge-teal">${e.modality}</span></td>
                  <td>${e.indication}</td>
                  <td style="max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.findings}</td>
                  <td><button class="btn btn-ghost btn-sm" onclick="viewDiagDetail('imaging','${e.id}')">View</button></td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>` : ''}`;
}

function switchDiagTab(tab) { state.diagTab = tab; renderDiagnostics(); }

function viewDiagDetail(type, id) {
  const study = appData.diagnostics[type].find(x => x.id === id);
  if (!study) return;
  const titleMap = { eeg:'EEG Report', emg:'EMG / NCS Report', imaging:'Imaging Report' };
  openModal(titleMap[type], `
    <div class="form-row form-row-2">
      <div><label>Patient</label><div style="font-weight:600">${study.patientName}</div></div>
      <div><label>Date</label><div>${study.date}</div></div>
    </div>
    ${type === 'imaging' ? `
      <div class="form-row"><div><label>Modality</label><div>${study.modality}</div></div></div>` : `
      <div class="form-row"><div><label>Technician</label><div>${study.technician}</div></div></div>`}
    <div class="form-row"><div><label>Indication</label><div>${study.indication}</div></div></div>
    ${type !== 'imaging' ? `<div class="form-row"><div><label>Results</label><div><span class="badge ${study.findings === 'Normal' ? 'badge-green' : 'badge-red'}">${study.findings}</span></div></div></div>` : ''}
    <div class="form-row"><div><label>Findings / Summary</label><div style="line-height:1.6;font-size:13px;color:#D1D5DB">${type === 'imaging' ? study.findings : study.summary}</div></div></div>
    <button class="btn btn-ghost btn-sm" style="margin-top:12px" onclick="aiInterpret('${type}','${id}')">✦ AI Interpret</button>
    <div id="ai_diag_box" class="ai-box hidden"><div class="ai-box-title">✦ AI Clinical Interpretation</div><div id="ai_diag_text" class="ai-result"></div></div>`);
}

async function aiInterpret(type, id) {
  const key = getApiKey();
  if (!key) { alert('Enter your Anthropic API key in Settings first.'); return; }
  const study = appData.diagnostics[type].find(x => x.id === id);
  if (!study) return;
  const box = document.getElementById('ai_diag_box');
  box.classList.remove('hidden');
  document.getElementById('ai_diag_text').innerHTML = '<div class="ai-spinner"><div class="spinner"></div>Interpreting...</div>';
  const raw = type === 'imaging' ? study.findings : study.summary;
  const prompt = `You are a neurologist. Provide a brief, clinically useful interpretation of these ${type.toUpperCase()} findings for a patient with ICD-10 ${study.icd10}. Be concise (3-5 sentences). Findings: ${raw}`;
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{ 'x-api-key': key, 'anthropic-version':'2023-06-01', 'content-type':'application/json', 'anthropic-dangerous-direct-browser-calls':'true' },
      body: JSON.stringify({ model:'claude-haiku-4-5-20251001', max_tokens:300, messages:[{ role:'user', content: prompt }] })
    });
    const data = await resp.json();
    document.getElementById('ai_diag_text').textContent = data.content[0].text;
  } catch(e) {
    document.getElementById('ai_diag_text').textContent = 'Error: ' + e.message;
  }
}

function openAddDiag() {
  const tab = state.diagTab;
  const tabLabels = { eeg:'EEG Study', emg:'EMG / NCS Study', imaging:'Imaging Study' };
  openModal(`Add ${tabLabels[tab]}`, `
    <div class="form-row">
      <div><label>Patient</label>
        <select id="diag_pt"><option value="">Select patient...</option>${appData.patients.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select>
      </div>
    </div>
    <div class="form-row form-row-2">
      <div><label>Date</label><input type="date" id="diag_date" value="${new Date().toISOString().split('T')[0]}"></div>
      ${tab === 'imaging' ?
        `<div><label>Modality</label><select id="diag_mod"><option>MRI Brain</option><option>MRI Spine</option><option>CT Head</option><option>CT Angiography</option><option>PET Brain</option></select></div>` :
        `<div><label>Technician</label><input type="text" id="diag_tech" value="Dr. Michael Harmon, MD"></div>`}
    </div>
    <div class="form-row"><div><label>Indication</label><input type="text" id="diag_ind" placeholder="Clinical indication for study..."></div></div>
    ${tab === 'eeg' ? `<div class="form-row"><div><label>Findings</label><select id="diag_find"><option>Normal</option><option>Abnormal-Focal</option><option>Abnormal-Generalized</option><option>Sleep-Abnormal</option></select></div></div>` : ''}
    ${tab === 'emg' ? `<div class="form-row"><div><label>Results</label><select id="diag_find"><option>Normal</option><option>Abnormal</option></select></div></div>` : ''}
    <div class="form-row"><div><label>${tab === 'imaging' ? 'Findings' : 'Summary'}</label><textarea id="diag_summary" rows="4" placeholder="${tab === 'imaging' ? 'Radiological findings...' : 'Study summary and interpretation...'}"></textarea></div></div>
    <button class="btn btn-teal w-full" onclick="saveDiag('${tab}')">Save Study</button>`);
}

function saveDiag(type) {
  const ptId = document.getElementById('diag_pt').value;
  if (!ptId) { alert('Select a patient.'); return; }
  const pt = appData.patients.find(p => p.id === ptId);
  const base = { id: type[0] + 'm' + Date.now(), patientId: ptId, patientName: pt.name, date: document.getElementById('diag_date').value, indication: document.getElementById('diag_ind').value, icd10: pt.icd10 };
  if (type === 'imaging') {
    appData.diagnostics.imaging.unshift({ ...base, modality: document.getElementById('diag_mod').value, findings: document.getElementById('diag_summary').value });
  } else {
    appData.diagnostics[type].unshift({ ...base, technician: document.getElementById('diag_tech').value, findings: document.getElementById('diag_find').value, summary: document.getElementById('diag_summary').value });
  }
  appData.activity.unshift({ text:`${type.toUpperCase()} study logged: ${pt.name}`, time: base.date + ' ' + new Date().toTimeString().slice(0,5) });
  saveData();
  closeModal();
  renderDiagnostics();
}

          <div style="font-size:13px">Notes: <strong>${appData.notes.length}</strong></div>
          <div style="font-size:13px">Claims: <strong>${appData.charges.length}</strong></div>

function saveProfile() {
  const s = { clinicName: document.getElementById('s_clinic').value, doctorName: document.getElementById('s_doc').value, npi: document.getElementById('s_npi').value, phone: document.getElementById('s_phone').value, address: document.getElementById('s_addr').value };
  saveSettings(s);
  document.querySelector('.sidebar-clinic-name').textContent = s.clinicName;
  document.querySelector('.sidebar-clinic-doc').textContent = s.doctorName;
  alert('Profile saved.');
}

function saveApiKeyFromSettings() {
  saveApiKey(document.getElementById('s_apikey').value.trim());
  alert('API key saved.');
}

function changePassword() {
  const oldPw = document.getElementById('s_oldpw').value;
  const stored = localStorage.getItem(PW_KEY) || DEFAULT_PW;
  if (btoa(oldPw) !== stored) { alert('Current password incorrect.'); return; }
  const newPw = document.getElementById('s_newpw').value;
  const confirmPw = document.getElementById('s_confirmpw').value;
  if (newPw !== confirmPw) { alert('Passwords do not match.'); return; }
  if (newPw.length < 6) { alert('Password must be at least 6 characters.'); return; }
  localStorage.setItem(PW_KEY, btoa(newPw));
  alert('Password changed successfully.');
  document.getElementById('s_oldpw').value = '';
  document.getElementById('s_newpw').value = '';
  document.getElementById('s_confirmpw').value = '';
}

function exportData() {
  const blob = new Blob([JSON.stringify(appData, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'neuroflow-data-' + new Date().toISOString().split('T')[0] + '.json'; a.click();
  URL.revokeObjectURL(url);
}
